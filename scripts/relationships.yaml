# Minimal governed-repo relationships graph scaffold.

required_reading:
  defaults:
    - CLAUDE.md

governance: []

# Doc-code couplings: when a `sources` file changes, the coupled `docs` should be
# reconsidered. Kept `soft: true` so these warn (not hard-fail) — they flag
# "you touched invariant-bearing code; check the doc still matches", which is the
# real risk this repo's docs drifted into (claims outrunning code). Not vacuous:
# `make docs-check` (--validate-config) verifies every doc path here exists.
couplings:
  - sources: ["qc_clean/core/grounding.py", "qc_clean/core/segmentation.py"]
    docs: ["docs/PROJECT_THEORY_AND_GOALS.md", "docs/EVALUATION_HARNESS.md"]
    description: "INV-1 grounding / INV-8 segment universe + coverage — theory invariants and harness D1/D2 must track this code"
    soft: true
  - sources: ["qc_clean/core/bench.py"]
    docs: ["docs/EVALUATION_HARNESS.md"]
    description: "Phase 0 scorecard implements harness D1/D2; keep the harness doc's 'implemented vs to-be-built' status honest"
    soft: true
  - sources: ["qc_clean/core/pipeline/stages/negative_case.py"]
    docs: ["docs/PROJECT_THEORY_AND_GOALS.md"]
    description: "INV-6 disconfirmation scope (PARTIAL) — claim discipline depends on what this stage actually re-examines"
    soft: true

architecture: []
adrs: {}

# Optional scoped file coverage policy.
# - managed: files under managed include that are NOT explicitly registered
#   in governance/couplings/architecture will trigger policy actions.
# - unmanaged: files outside managed scope.
#
# Set managed.mode: hard-fail to require an explicit registration for every
# managed file before edits are allowed. Set managed.mode: warn to log soft warnings
# instead. Keep generated/large directories out of scope with managed.exclude.
#
# file_scope:
#   managed:
#     include: ["**"]
#     exclude: [".venv/**", ".claude/**", "generated/**"]
#     mode: warn
#   unmanaged:
#     mode: ignore
